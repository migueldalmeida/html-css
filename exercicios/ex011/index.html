<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens Dinamicas</title>
</head>
<body>
    <h1>trabalhando com imagens dinamicas</h1>
    <p>aumente e diminua o tamanho do seu navegador</p>
<picture>
    <source media="(max-width: 750px)" srcset="img/foto-p.jpg" type="image/jpg">
    <source media="(max-width: 950px)" srcset="img/foto-m.jpg" type="image/jpg">
    <img src="img/foto-g.jpg" alt="imagem flexivel">
</picture>
<h1>Reproduzindo audio</h1>
<p>vamos aprender a reproduzir audios em HTML 5.</p>
<audio preload="metadata" controls>
    <source src="midia/WhatsApp Ptt 2026-03-13 at 12.37.31.mp3" type="audio/mpeg">
</audio>
<br>
</body>
</html>
