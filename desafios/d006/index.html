<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags em HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em html5 podemos inserir os elementos da lista a seguir. Passe os mouses sobre os termos para descobrir qual tag utilizar em cada caso</p>
    <ul>
        <li><abbr title="&lt;p&gt;">paragrafo</abbr></li>
        <li><abbr title="&lt;h1&gt;">titulo</abbr></li>
        <li><abbr title="&lt;img&gt;">imagens</abbr></li>
    </ul>
    
</body>
</html>
